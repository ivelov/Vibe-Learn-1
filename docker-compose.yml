services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: kanban_root
      MYSQL_DATABASE: kanban
      MYSQL_USER: kanban
      MYSQL_PASSWORD: kanban
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pkanban_root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3307:3306"

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://kanban:kanban@db:3306/kanban
    ports:
      - "8000:8000"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
